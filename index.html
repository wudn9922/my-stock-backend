<!DOCTYPE html>
<html>
<head>
    <title>台美股均線潛伏報告</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { background-color: #111; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 10px; } 
        .header { text-align: center; padding: 15px 0; background: #222; margin-bottom: 15px; border-radius: 8px; } 
        .category-box { background: #1a1a1a; padding: 12px; margin-bottom: 15px; border-radius: 8px; border-left: 4px solid #00b0ff; } 
        .category-title { font-size: 15px; font-weight: bold; color: #00ff88; margin-bottom: 10px; padding-left: 5px; } 
        .tabs { display: flex; flex-wrap: wrap; gap: 6px; } 
        .tab-btn { background: #2a2a2a; color: #aaa; border: none; padding: 8px 12px; font-size: 13px; cursor: pointer; border-radius: 4px; transition: 0.3s; } 
        .tab-btn:hover { background: #3a3a3a; } 
        .tab-btn.active { background: #00b0ff; color: #fff; font-weight: bold; } 
        .market-section { display: none; max-width: 800px; margin: 0 auto; } 
        .market-section.active { display: block; } 
        .chart-card { background: #1e1e1e; margin-bottom: 25px; padding: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); } 
        .plotly-container { height: 400px; background: #151515; border-radius: 6px; } 
        .no-data { text-align: center; color: #888; padding: 40px; font-size: 14px; }
        
        /* 表單元素共用樣式 */
        .form-input { width: 100%; padding: 8px; margin: 5px 0; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        .form-btn { width: 100%; padding: 10px; font-weight: bold; border: none; border-radius: 4px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h2>📈 台美股量化潛伏網頁報告</h2>
        <p style="margin: 5px 0 0 0; color:#00ff88; font-size:13px;">增量滾動數據儲存版</p>
    </div>
    
    <div class="category-box" style="border-left-color: #ff5252;">
        <div class="category-title">🇹🇼 台灣股市區塊</div>
        <div class="tabs">
            <button id="btn-tw_all" class="tab-btn active" onclick="switchMarket(event, 'tw_all')">全市場潛伏</button>
            <button id="btn-tw_g1" class="tab-btn" onclick="switchMarket(event, 'tw_g1')">權值精選</button>
            <button id="btn-tw_g2" class="tab-btn" onclick="switchMarket(event, 'tw_g2')">熱門</button>
        </div>
    </div>

    <div class="category-box" style="border-left-color: #00b0ff;">
        <div class="category-title">🇺🇸 美國股市區塊</div>
        <div class="tabs">
            <button id="btn-us_all" class="tab-btn" onclick="switchMarket(event, 'us_all')">全市場潛伏</button>
            <button id="btn-us_g1" class="tab-btn" onclick="switchMarket(event, 'us_g1')">權值精選</button>
            <button id="btn-us_g2" class="tab-btn" onclick="switchMarket(event, 'us_g2')">低本益比</button>
            <button id="btn-us_g3" class="tab-btn" onclick="switchMarket(event, 'us_g3')">超級績效</button>
            <button id="btn-us_g4" class="tab-btn" onclick="switchMarket(event, 'us_g4')">熱門</button>
        </div>
    </div>

    <div id="tw_all-market" class="market-section active"><div class="no-data">此分類目前無股票符合群組自訂均線潛伏條件</div></div>
    <div id="tw_g1-market" class="market-section"><div class="no-data">此分類目前無股票符合群組自訂均線潛伏條件</div></div>
    <div id="tw_g2-market" class="market-section"><div class="no-data">此分類目前無股票符合群組自訂均線潛伏條件</div></div>
    
    <div id="us_all-market" class="market-section"><div class="no-data">此分類目前無股票符合群組自訂均線潛伏條件</div></div>
    <div id="us_g1-market" class="market-section"><div class="no-data">此分類目前無股票符合群組自訂均線潛伏條件</div></div>
    <div id="us_g2-market" class="market-section"><div class="no-data">此分類目前無股票符合群組自訂均線潛伏條件</div></div>
    <div id="us_g3-market" class="market-section"><div class="no-data">此分類目前無股票符合群組自訂均線潛伏條件</div></div>
    <div id="us_g4-market" class="market-section"><div class="no-data">此分類目前無股票符合群組自訂均線潛伏條件</div></div>

    <hr style="border: 1px solid #333; margin: 30px 0;">
    <div class="header" style="background: #00b0ff; padding: 10px;">
        <h3 style="margin: 0; color: #fff;">⚙️ 參數設定控制台</h3>
        <p id="liff-status" style="margin: 5px 0 0 0; color:#fff; font-size:13px;">正在檢查 LINE 登入狀態...</p>
        <p id="user-id-display" style="margin: 2px 0 0 0; color:#ffeb3b; font-size:11px;"></p>
    </div>

    <div class="category-box" style="border-left-color: #00ff88; display: none;" id="user-panel">
        <div class="category-title" style="color: #00ff88;">➕ 新增/修改 我的自選股</div>
        
        <input type="text" id="reg-ticker" class="form-input" placeholder="股票代號 (例: 2330.TW)">
        
        <select id="reg-group" class="form-input">
            <option value="tw_g1">🇹🇼 台股 - 權值精選</option>
            <option value="tw_g2">🇹🇼 台股 - 熱門</option>
            <option value="us_g1">🇺🇸 美股 - 權值精選</option>
            <option value="us_g2">🇺🇸 美股 - 低本益比</option>
            <option value="us_g3">🇺🇸 美股 - 超級績效</option>
            <option value="us_g4">🇺🇸 美股 - 熱門</option>
        </select>

        <input type="text" id="reg-mas" class="form-input" placeholder="均線參數 (用逗號隔開，例: 20,60,120)">
        <button onclick="saveUserStock()" class="form-btn" style="background: #00ff88; color: #000;">儲存自選股設定</button>
    </div>

    <div class="category-box" style="border-left-color: #ff5252; display: none;" id="admin-panel">
        <div class="category-title" style="color: #ff5252;">👑 全域大盤廣播參數 (僅管理員)</div>
        
        <select id="admin-idx-select" class="form-input" style="font-size: 14px;">
            <optgroup label="🇹🇼 台灣股市">
                <option value="^TWII">台灣加權指數 (^TWII)</option>
                <option value="^TWOII">櫃買指數 (^TWOII)</option>
            </optgroup>
            <optgroup label="🇺🇸 美國股市">
                <option value="^GSPC">標普500 (^GSPC)</option>
                <option value="^DJI">道瓊工業指數 (^DJI)</option>
                <option value="^IXIC">那斯達克 (^IXIC)</option>
                <option value="^RUT">羅素2000 (^RUT)</option>
                <option value="^SOX">費城半導體 (^SOX)</option>
            </optgroup>
            <optgroup label="🇪🇺 歐洲股市">
                <option value="^FCHI">法國 CAC40 (^FCHI)</option>
                <option value="^FTSE">英國富時100 (^FTSE)</option>
                <option value="^GDAXI">德國 DAX (^GDAXI)</option>
            </optgroup>
            <optgroup label="🌏 亞洲股市">
                <option value="^N225">日經225 (^N225)</option>
                <option value="^KS11">韓國 KOSPI (^KS11)</option>
            </optgroup>
        </select>

        <input type="text" id="admin-idx-mas" class="form-input" placeholder="請輸入大盤均線參數 (例: 20,50,200)">
        <button onclick="saveAdminStock()" class="form-btn" style="background: #ff5252; color: #fff;">儲存大盤設定</button>
    </div>

    <script>
        // 頁籤切換邏輯
        function switchMarket(evt, marketName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("market-section");
            for (i = 0; i < tabcontent.length; i++) { tabcontent[i].style.display = "none"; }
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) { tablinks[i].className = tablinks[i].className.replace(" active", ""); }
            document.getElementById(marketName + "-market").style.display = "block";
            evt.currentTarget.className += " active";
        }

        const SUPABASE_URL = "https://bxhqpfeberqbtxymghyt.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_eEJNM_96jblQ_90vpcYC0g_PzyGJNOK";
        const LIFF_ID = "2010330411-SbwvRXRN"; 
        
        // 🚨 請檢查這串 ID 是否與網頁上黃色小字顯示的一模一樣
        const ADMIN_LINE_ID = "Ua0037dbd5037b64fc76804c60520ad76";

        let _supabase;
        let currentUserId = "GUEST";

        window.onload = async function() {
            try {
                _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                await liff.init({ liffId: LIFF_ID });
                
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    currentUserId = profile.userId;
                    
                    document.getElementById("liff-status").innerText = "👤 已登入: " + profile.displayName;
                    document.getElementById("user-id-display").innerText = "ID: " + currentUserId; // 顯示 ID 幫你除錯

                    document.getElementById("user-panel").style.display = "block";
                    
                    // 判斷是否為管理員，如果 ID 符合才顯示管理員面板
                    if (currentUserId === ADMIN_LINE_ID) {
                        document.getElementById("admin-panel").style.display = "block";
                    }
                } else {
                    document.getElementById("liff-status").innerText = "⚠️ 尚未登入 LINE，正在導向...";
                    liff.login();
                }
            } catch (err) {
                document.getElementById("liff-status").innerText = "❌ 系統初始化失敗: " + err.message;
            }
        };

        // 👨‍💻 一般用戶存檔邏輯
        async function saveUserStock() {
            if (!_supabase) return alert("Supabase 未就緒！");
            if (currentUserId === "GUEST") return alert("未授權！");

            let ticker = document.getElementById("reg-ticker").value.trim().toUpperCase();
            let groupId = document.getElementById("reg-group").value;
            let masStr = document.getElementById("reg-mas").value.trim();

            if (!ticker || !masStr) return alert("請填寫代號與均線！");
            if (ticker.startsWith("^") || ticker.includes("大盤")) return alert("🛑 一般用戶無法設定大盤！");

            let masArray = masStr.split(',').map(num => parseInt(num.trim())).filter(num => !isNaN(num));
            
            const saveData = {
                line_user_id: currentUserId,
                ticker: ticker,
                group_id: groupId,
                ma1: masArray[0] || 0,
                ma2: masArray[1] || 0,
                ma3: masArray[2] || 0,
                ma4: masArray[3] || 0
            };

            const { error } = await _supabase.from('stocks').upsert(saveData, { onConflict: 'line_user_id,ticker' });

            if (error) {
                alert("❌ 寫入失敗: " + error.message);
            } else {
                alert(`🎉 儲存成功！\n代號: ${ticker}\n群組: ${groupId}`);
                document.getElementById("reg-ticker").value = "";
                document.getElementById("reg-mas").value = "";
            }
        }

        // 👑 管理員專屬大盤存檔邏輯 (抓取下拉選單的值)
        async function saveAdminStock() {
            if (!_supabase) return alert("Supabase 未就緒！");

            let ticker = document.getElementById("admin-idx-select").value;
            let masStr = document.getElementById("admin-idx-mas").value.trim();
            
            if (!masStr) return alert("請填寫大盤均線參數！");

            let masArray = masStr.split(',').map(num => parseInt(num.trim())).filter(num => !isNaN(num));

            const saveData = {
                line_user_id: currentUserId,
                ticker: ticker,
                group_id: "admin_index", // 大盤統一存入這個群組
                ma1: masArray[0] || 0,
                ma2: masArray[1] || 0,
                ma3: masArray[2] || 0,
                ma4: masArray[3] || 0
            };

            const { error } = await _supabase.from('stocks').upsert(saveData, { onConflict: 'line_user_id,ticker' });

            if (error) {
                alert("❌ 大盤參數寫入失敗: " + error.message);
            } else {
                alert(`👑 大盤參數更新成功！\n代號: ${ticker}\n均線: ${masStr}`);
                document.getElementById("admin-idx-mas").value = "";
            }
        }
    </script>
</body>
</html>

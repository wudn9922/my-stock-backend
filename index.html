<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">

    <title>自選股均線參數控制台</title>

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
        }

        .header {
            text-align: center;
            padding: 15px 0;
            background: #222;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .category-box {
            background: #1a1a1a;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 4px solid #00b0ff;
        }

        .category-title {
            font-size: 15px;
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 10px;
            padding-left: 5px;
        }

        .form-input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .form-input:disabled {
            background: #333;
            color: #aaa;
            cursor: not-allowed;
        }

        .form-btn {
            width: 100%;
            padding: 10px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            margin-top: 10px;
            cursor: pointer;
        }

        .form-btn:disabled,
        .action-btn:disabled,
        .group-action-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .stock-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
        }

        .stock-table th {
            background: #222;
            color: #aaa;
            padding: 10px;
            text-align: left;
            border-bottom: 2px solid #444;
            white-space: nowrap;
        }

        .stock-table td {
            padding: 10px;
            border-bottom: 1px solid #333;
            color: #fff;
        }

        .title-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .list-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 10px 0;
        }

        .list-toolbar .form-input {
            flex: 1;
            margin: 0;
        }

        .clear-btn,
        .action-btn,
        .group-action-btn {
            border: none;
            border-radius: 4px;
            padding: 7px 10px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }

        .clear-btn {
            background: #555;
            color: #fff;
        }

        .edit-btn {
            background: #00b0ff;
            color: #fff;
            margin-right: 5px;
        }

        .delete-btn {
            background: #ff5252;
            color: #fff;
        }

        .cancel-btn {
            background: #666;
            color: #fff;
            display: none;
        }

        .list-summary {
            color: #aaa;
            font-size: 12px;
            margin: 8px 0 0 2px;
        }

        .editing-message {
            display: none;
            color: #ffeb3b;
            background: #2b2a16;
            border: 1px solid #665f12;
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            line-height: 1.5;
        }

        .group-create-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .group-create-row .form-input {
            flex: 1;
            margin: 0;
        }

        .group-create-button {
            width: auto;
            min-width: 100px;
            margin: 0;
            background: #ab47bc;
            color: #fff;
        }

        .group-help {
            color: #999;
            font-size: 12px;
            line-height: 1.5;
            margin: 9px 2px;
        }

        .custom-group-list {
            margin-top: 12px;
        }

        .custom-group-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 10px;
            margin-bottom: 7px;
            background: #222;
            border: 1px solid #383838;
            border-radius: 5px;
        }

        .custom-group-info {
            min-width: 0;
            flex: 1;
        }

        .custom-group-name {
            color: #e1bee7;
            font-weight: bold;
            word-break: break-word;
        }

        .custom-group-count {
            color: #888;
            font-size: 11px;
            margin-top: 4px;
        }

        .custom-group-actions {
            display: flex;
            gap: 5px;
        }

        .group-edit-btn {
            background: #00b0ff;
            color: #fff;
        }

        .group-delete-btn {
            background: #ff5252;
            color: #fff;
        }

        .empty-group-message {
            color: #777;
            text-align: center;
            padding: 15px;
            border: 1px dashed #444;
            border-radius: 5px;
        }

        @media (max-width: 600px) {
            .list-toolbar,
            .group-create-row {
                flex-direction: column;
                align-items: stretch;
            }

            .group-create-button {
                width: 100%;
            }

            .stock-table th,
            .stock-table td {
                padding: 8px 6px;
                font-size: 12px;
            }

            .action-btn {
                display: block;
                width: 100%;
                margin: 3px 0;
            }

            .edit-btn {
                margin-right: 0;
            }

            .custom-group-item {
                align-items: flex-start;
                flex-direction: column;
            }

            .custom-group-actions {
                width: 100%;
            }

            .group-action-btn {
                flex: 1;
            }
        }
    </style>
</head>

<body>

    <!-- 頁首 -->
    <div
        class="header"
        style="background: #00b0ff;"
    >
        <h2 style="margin: 0; color: #fff;">
            ⚙️ 自選股均線參數控制台
        </h2>

        <p
            id="liff-status"
            style="margin: 5px 0 0 0; color:#fff; font-size:13px;"
        >
            網頁骨架已載入...
        </p>

        <p
            id="user-id-display"
            style="margin: 2px 0 0 0; color:#ffeb3b; font-size:11px;"
        >
            正在載入身分識別...
        </p>
    </div>

    <!-- 自訂分組管理 -->
    <div
        class="category-box"
        style="border-left-color: #ab47bc;"
        id="group-panel"
    >
        <div
            class="category-title"
            style="color: #e1bee7;"
        >
            🗂️ 我的自訂分組
        </div>

        <div class="group-create-row">
            <input
                type="text"
                id="new-group-name"
                class="form-input"
                placeholder="請輸入新分組名稱"
                maxlength="30"
                autocomplete="off"
            >

            <button
                type="button"
                id="create-group-btn"
                class="form-btn group-create-button"
                onclick="createCustomGroup()"
            >
                新增分組
            </button>
        </div>

        <div class="group-help">
            每個自訂分組只屬於目前登入的 LINE 使用者。分組內還有股票時，必須先移動或刪除股票，才能刪除該分組。
        </div>

        <div
            id="custom-group-list"
            class="custom-group-list"
        >
            <div class="empty-group-message">
                自訂分組載入中...
            </div>
        </div>
    </div>

    <!-- 使用者自選股設定 -->
    <div
        class="category-box"
        style="border-left-color: #00ff88;"
        id="user-panel"
    >
        <div
            class="category-title"
            style="color: #00ff88;"
            id="user-panel-title"
        >
            ➕ 新增/修改 我的自選股
        </div>

        <div
            id="editing-message"
            class="editing-message"
        >
            ✏️ 目前正在編輯這一筆自選股設定。<br>
            股票代號不可修改，但可以修改分組及均線參數。<br>
            修改不會影響其他分組中的相同股票。
        </div>

        <input
            type="text"
            id="reg-ticker"
            class="form-input"
            placeholder="股票代號 (例: 2330.TW)"
            autocomplete="off"
        >

        <select
            id="reg-group"
            class="form-input"
        >
            <optgroup
                id="reg-fixed-group-options"
                label="系統預設分組"
            >
                <option value="tw_g1">
                    🇹🇼 台股 - 權值精選
                </option>

                <option value="tw_g2">
                    🇹🇼 台股 - 熱門
                </option>

                <option value="us_g1">
                    🇺🇸 美股 - 權值精選
                </option>

                <option value="us_g2">
                    🇺🇸 美股 - 低本益比
                </option>

                <option value="us_g3">
                    🇺🇸 美股 - 超級績效
                </option>

                <option value="us_g4">
                    🇺🇸 美股 - 熱門
                </option>
            </optgroup>

            <optgroup
                id="reg-custom-group-options"
                label="我的自訂分組"
            ></optgroup>
        </select>

        <input
            type="text"
            id="reg-mas"
            class="form-input"
            placeholder="均線參數 (用逗號隔開，例: 20,60,120)"
            autocomplete="off"
        >

        <button
            type="button"
            id="save-user-stock-btn"
            onclick="saveUserStock()"
            class="form-btn"
            style="background: #00ff88; color: #000;"
        >
            儲存自選股設定
        </button>

        <button
            type="button"
            id="cancel-edit-btn"
            onclick="cancelEditStock()"
            class="form-btn cancel-btn"
        >
            取消編輯
        </button>
    </div>

    <!-- 管理員大盤設定 -->
    <div
        class="category-box"
        style="border-left-color: #ff5252; display: none;"
        id="admin-panel"
    >
        <div
            class="category-title"
            style="color: #ff5252;"
        >
            👑 全域大盤廣播參數 (僅管理員)
        </div>

        <select
            id="admin-idx-select"
            class="form-input"
            style="font-size: 14px;"
        >
            <optgroup label="🇹🇼 台灣股市">
                <option value="^TWII">
                    台灣加權指數 (^TWII)
                </option>

                <option value="^TWOII">
                    櫃買指數 (^TWOII)
                </option>
            </optgroup>

            <optgroup label="🇺🇸 美國股市">
                <option value="^GSPC">
                    標普500 (^GSPC)
                </option>

                <option value="^IXIC">
                    那斯達克 (^IXIC)
                </option>

                <option value="^IXIC">
                    那斯達克 (^IXIC)
                </option>

                <option value="^RUT">
                    羅素2000 (^RUT)
                </option>

                <option value="^SOX">
                    費城半導體 (^SOX)
                </option>
            </optgroup>

            <optgroup label="🇪🇺 歐洲股市">
                <option value="^FCHI">
                    法國 CAC40 (^FCHI)
                </option>

                <option value="^FTSE">
                    英國富時100 (^FTSE)
                </option>

                <option value="^GDAXI">
                    德國 DAX (^GDAXI)
                </option>
            </optgroup>

            <optgroup label="🌏 亞洲股市">
                <option value="^N225">
                    日經225 (^N225)
                </option>

                <option value="^KS11">
                    韓國 KOSPI (^KS11)
                </option>
            </optgroup>
        </select>

        <input
            type="text"
            id="admin-idx-mas"
            class="form-input"
            placeholder="請輸入大盤均線參數 (例: 20,50,200)"
        >

        <button
            type="button"
            id="save-admin-stock-btn"
            onclick="saveAdminStock()"
            class="form-btn"
            style="background: #ff5252; color: #fff;"
        >
            儲存大盤設定
        </button>
    </div>

    <!-- 自選股清單 -->
    <div
        class="category-box"
        style="border-left-color: #ffeb3b;"
        id="stock-list-panel"
    >
        <div
            class="category-title title-flex"
            style="color: #ffeb3b;"
        >
            <span>📋 我的自選股追蹤清單</span>

            <select
                id="list-filter"
                class="form-input"
                style="width: auto; padding: 4px 8px; margin: 0; font-size: 13px;"
                onchange="renderStockList()"
            >
                <option value="all">
                    👀 顯示全部
                </option>

                <optgroup
                    id="filter-fixed-group-options"
                    label="系統預設分組"
                >
                    <option value="tw_g1">
                        🇹🇼 台股 - 權值
                    </option>

                    <option value="tw_g2">
                        🇹🇼 台股 - 熱門
                    </option>

                    <option value="us_g1">
                        🇺🇸 美股 - 權值
                    </option>

                    <option value="us_g2">
                        🇺🇸 美股 - 低本
                    </option>

                    <option value="us_g3">
                        🇺🇸 美股 - 績效
                    </option>

                    <option value="us_g4">
                        🇺🇸 美股 - 熱門
                    </option>
                </optgroup>

                <optgroup
                    id="filter-custom-group-options"
                    label="我的自訂分組"
                ></optgroup>
            </select>
        </div>

        <div class="list-toolbar">
            <input
                type="search"
                id="stock-search"
                class="form-input"
                placeholder="搜尋股票代號或分組..."
                oninput="renderStockList()"
                autocomplete="off"
            >

            <button
                type="button"
                class="clear-btn"
                onclick="clearStockSearch()"
            >
                清除搜尋
            </button>
        </div>

        <div
            id="list-summary"
            class="list-summary"
        >
            資料載入中...
        </div>

        <div style="overflow-x: auto;">
            <table class="stock-table">
                <thead>
                    <tr>
                        <th>編號</th>
                        <th>代碼</th>
                        <th>分組</th>
                        <th>參數</th>
                        <th>操作</th>
                    </tr>
                </thead>

                <tbody id="stock-list-body">
                    <tr>
                        <td
                            colspan="5"
                            style="text-align:center; color:#666;"
                        >
                            系統初始化中...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        window.onerror = function(
            message,
            source,
            lineno,
            colno,
            error
        ) {
            alert(
                "🚨 網頁出錯了！\n" +
                "錯誤訊息: " + message + "\n" +
                "錯誤行號: " + lineno
            );

            return false;
        };
    </script>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        /*
         * 注意：
         * GitHub Pages 的 HTML 無法讀取 Render Secret。
         * 這裡保留原本前端 Supabase publishable key，
         * 並不是 service_role key。
         */
        const SUPABASE_URL =
            "https://bxhqpfeberqbtxymghyt.supabase.co";

        const SUPABASE_ANON_KEY =
            "sb_publishable_eEJNM_96jblQ_90vpcYC0g_PzyGJNOK";

        const LIFF_ID =
            "2010330411-SbwvRXRN";

        const ADMIN_LINE_ID =
            "Ua0037dbd5037b64fc76804c60520ad76";

        let _supabase;
        let currentUserId = "GUEST";
        let allUserStocks = [];
        let customGroups = [];

        let editingStockId = null;
        let editingTicker = null;
        let editingOriginalGroupId = null;

        const fixedGroupNameMap = {
            "tw_g1": "台股權值",
            "tw_g2": "台股熱門",
            "us_g1": "美股權值",
            "us_g2": "低本益比",
            "us_g3": "超級績效",
            "us_g4": "美股熱門"
        };

        const groupNameMap = {
            ...fixedGroupNameMap
        };

        window.onload = async function() {
            try {
                _supabase = supabase.createClient(
                    SUPABASE_URL,
                    SUPABASE_ANON_KEY
                );
            } catch (error) {
                alert(
                    "Supabase 連線失敗: " +
                    error.message
                );
            }

            try {
                await liff.init({
                    liffId: LIFF_ID
                });

                if (liff.isLoggedIn()) {
                    const profile =
                        await liff.getProfile();

                    currentUserId =
                        profile.userId.trim();

                    document.getElementById(
                        "liff-status"
                    ).innerText =
                        "👤 已登入: " +
                        profile.displayName;

                    document.getElementById(
                        "user-id-display"
                    ).innerText =
                        "ID: " + currentUserId;

                    if (
                        currentUserId ===
                        ADMIN_LINE_ID.trim()
                    ) {
                        document.getElementById(
                            "admin-panel"
                        ).style.display = "block";
                    }
                } else {
                    document.getElementById(
                        "liff-status"
                    ).innerText =
                        "⚠️ 測試模式 (未在 LINE 內登入)";

                    currentUserId =
                        "BROWSER_TEST_USER";

                    document.getElementById(
                        "user-id-display"
                    ).innerText =
                        "ID: BROWSER_TEST_USER";

                    document.getElementById(
                        "admin-panel"
                    ).style.display = "block";
                }
            } catch (error) {
                document.getElementById(
                    "liff-status"
                ).innerText =
                    "ℹ️ 瀏覽器預覽模式";

                currentUserId =
                    "BROWSER_TEST_USER";

                document.getElementById(
                    "user-id-display"
                ).innerText =
                    "ID: BROWSER_TEST_USER";

                document.getElementById(
                    "admin-panel"
                ).style.display = "block";
            }

            await fetchCustomGroups();
            await fetchUserStocks();
        };

        function getCustomGroupValue(groupId) {
            return "custom_" + String(groupId);
        }

        function getCustomGroupId(groupValue) {
            const value = String(groupValue || "");

            if (!value.startsWith("custom_")) {
                return null;
            }

            const id = value.substring(7);

            return id || null;
        }

        function isCustomGroupValue(groupValue) {
            return String(
                groupValue || ""
            ).startsWith("custom_");
        }

        function getGroupDisplayName(groupId) {
            return (
                groupNameMap[groupId] ||
                groupId ||
                "未知分組"
            );
        }

        function validateGroupName(groupName) {
            const cleanName =
                String(groupName || "").trim();

            if (!cleanName) {
                return {
                    success: false,
                    message: "請輸入分組名稱！"
                };
            }

            if (cleanName.length > 30) {
                return {
                    success: false,
                    message: "分組名稱不可超過 30 個字！"
                };
            }

            if (
                /[<>]/.test(cleanName)
            ) {
                return {
                    success: false,
                    message: "分組名稱不可包含 < 或 > 符號！"
                };
            }

            const duplicateFixed =
                Object.values(
                    fixedGroupNameMap
                ).some(
                    name =>
                        name.toLowerCase() ===
                        cleanName.toLowerCase()
                );

            const duplicateCustom =
                customGroups.some(
                    group =>
                        String(group.name)
                            .trim()
                            .toLowerCase() ===
                        cleanName.toLowerCase()
                );

            if (
                duplicateFixed ||
                duplicateCustom
            ) {
                return {
                    success: false,
                    message: "已經存在相同名稱的分組！"
                };
            }

            return {
                success: true,
                value: cleanName
            };
        }

        async function fetchCustomGroups() {
            if (!_supabase) {
                renderCustomGroupList();
                return;
            }

            if (
                currentUserId ===
                "BROWSER_TEST_USER"
            ) {
                if (
                    customGroups.length === 0
                ) {
                    customGroups = [
                        {
                            id: "test-group-1",
                            name: "長期觀察",
                            line_user_id:
                                "BROWSER_TEST_USER",
                            ma1: 5,
                            ma2: 10,
                            ma3: 20,
                            ma4: 60
                        }
                    ];
                }

                rebuildCustomGroupOptions();
                renderCustomGroupList();
                return;
            }

            const { data, error } =
                await _supabase
                    .from("groups")
                    .select(
                        "id, name, line_user_id, ma1, ma2, ma3, ma4"
                    )
                    .eq(
                        "line_user_id",
                        currentUserId
                    )
                    .order(
                        "created_at",
                        {
                            ascending: true
                        }
                    );

            if (error) {
                console.error(error);

                customGroups = [];

                document.getElementById(
                    "custom-group-list"
                ).innerHTML = "";

                const message =
                    document.createElement("div");

                message.className =
                    "empty-group-message";

                message.textContent =
                    "❌ 自訂分組讀取失敗：" +
                    error.message;

                document.getElementById(
                    "custom-group-list"
                ).appendChild(message);

                rebuildCustomGroupOptions();
                return;
            }

            customGroups = data || [];

            rebuildCustomGroupOptions();
            renderCustomGroupList();
        }

        function rebuildCustomGroupOptions() {
            Object.keys(groupNameMap).forEach(
                key => {
                    if (
                        key.startsWith("custom_")
                    ) {
                        delete groupNameMap[key];
                    }
                }
            );

            const registerGroup =
                document.getElementById(
                    "reg-custom-group-options"
                );

            const filterGroup =
                document.getElementById(
                    "filter-custom-group-options"
                );

            const registerSelect =
                document.getElementById(
                    "reg-group"
                );

            const filterSelect =
                document.getElementById(
                    "list-filter"
                );

            const previousRegisterValue =
                registerSelect.value;

            const previousFilterValue =
                filterSelect.value;

            registerGroup.innerHTML = "";
            filterGroup.innerHTML = "";

            customGroups.forEach(group => {
                const groupValue =
                    getCustomGroupValue(
                        group.id
                    );

                groupNameMap[groupValue] =
                    group.name;

                const registerOption =
                    document.createElement(
                        "option"
                    );

                registerOption.value =
                    groupValue;

                registerOption.textContent =

            const registerValueExists =

                    registerSelect.options
                ).some(
                    option =>
                        option.value ===
                        previousRegisterValue
                );

            if (registerValueExists) {
                registerSelect.value =
                    previousRegisterValue;

            const filterValueExists =
                Array.from(
                    filterSelect.options
                ).some(
                    option =>
                        option.value ===
                        previousFilterValue
                );

                filterSelect.value = "all";

        function parseMovingAverages(value) {
            const masStr =
                String(value || "").trim();

            if (!masStr) {
                return {
                    success: false,
                    message:
                        "請填寫均線參數！"
                };
            }

            const rawValues =
                masStr
                    .split(",")
                    .map(
                        item =>
                            item.trim()
                    );

            if (rawValues.length > 4) {
                return {
                    success: false,
                    message:
                        "均線參數最多只能設定 4 組！"
                };
            }

            if (
                rawValues.some(
                    item => item === ""
                )
            ) {
                return {
                    success: false,
                    message:
                        "均線格式不正確，請使用逗號分隔，例如：20,60,120"
                };
            }

            const masArray =
                rawValues.map(Number);

            const hasInvalidValue =
                masArray.some(
                    number =>
                        !Number.isInteger(
                            number
                        ) ||
                        number <= 0 ||
                        number > 1000
                );

            if (hasInvalidValue) {
                return {
                    success: false,
                    message:
                        "均線必須是 1～1000 的正整數！"
                };
            }

            if (
                new Set(masArray).size !==
                masArray.length
            ) {
                return {
                    success: false,
                    message:
                        "均線參數不可重複！"
                };
            }

            return {
                success: true,
                values: masArray
            };
        }

        async function saveUserStock() {
            if (!_supabase) {
                return alert(
                    "Supabase 未就緒！"
                );
            }

            const saveButton =
                document.getElementById(
                    "save-user-stock-btn"
                );

            const tickerInput =
                document.getElementById(
                    "reg-ticker"
                );

            const ticker =
                tickerInput.value
                    .trim()
                    .toUpperCase();

            const groupId =
                document.getElementById(
                    "reg-group"
                ).value;

            const masStr =
                document.getElementById(
                    "reg-mas"
                ).value.trim();

            if (!ticker || !masStr) {
                return alert(
                    "請填寫代號與均線！"
                );
            }

            if (!groupId) {
                return alert(
                    "請選擇分組！"
                );
            }

            const tickerPattern =
                /^[A-Z0-9.^_-]{1,30}$/;

            if (
                !tickerPattern.test(ticker)
            ) {
                return alert(
                    "股票代號格式不正確，請確認後再試。"
                );
            }

            const maResult =
                parseMovingAverages(
                    masStr
                );

            if (!maResult.success) {
                return alert(
                    maResult.message
                );
            }

            const masArray =
                maResult.values;

            const saveData = {
                line_user_id:
                    currentUserId,
                ticker: ticker,
                group_id: groupId,
                ma1: masArray[0] || 0,
                ma2: masArray[1] || 0,
                ma3: masArray[2] || 0,
                ma4: masArray[3] || 0
            };

            const isEditing =
                editingStockId !== null;

            try {
                saveButton.disabled = true;

                saveButton.innerText =
                    isEditing
                        ? "修改中..."
                        : "儲存中...";

                if (
                    currentUserId ===
                    "BROWSER_TEST_USER"
                ) {
                    if (isEditing) {
                        const duplicateStock =
                            allUserStocks.find(
                                stock =>
                                    stock.id !==
                                        editingStockId &&
                                    stock.ticker ===
                                        ticker &&
                                    stock.group_id ===
                                        groupId
                            );

                        if (duplicateStock) {
                            throw new Error(
                                ticker +
                                " 已經存在於這個分組中。"
                            );
                        }

                        const existingIndex =
                            allUserStocks.findIndex(
                                stock =>
                                    stock.id ===
                                    editingStockId
                            );

                        if (
                            existingIndex === -1
                        ) {
                            throw new Error(
                                "找不到要修改的自選股資料。"
                            );
                        }

                        allUserStocks[
                            existingIndex
                        ] = {
                            id: editingStockId,
                            ticker: ticker,
                            group_id: groupId,
                            ma1: saveData.ma1,
                            ma2: saveData.ma2,
                            ma3: saveData.ma3,
                            ma4: saveData.ma4
                        };
                    } else {
                        const existingStock =
                            allUserStocks.find(
                                stock =>
                                    stock.ticker ===
                                        ticker &&
                                    stock.group_id ===
                                        groupId
                            );

                        if (existingStock) {
                            existingStock.ma1 =
                                saveData.ma1;

                            existingStock.ma2 =
                                saveData.ma2;

                            existingStock.ma3 =
                                saveData.ma3;

                            existingStock.ma4 =
                                saveData.ma4;
                        } else {
                            allUserStocks.push({
                                id:
                                    "test-stock-" +
                                    Date.now() +
                                    "-" +
                                    Math.random()
                                        .toString(36)
                                        .slice(2),
                                ticker: ticker,
                                group_id: groupId,
                                ma1: saveData.ma1,
                                ma2: saveData.ma2,
                                ma3: saveData.ma3,
                                ma4: saveData.ma4
                            });
                        }
                    }

                    cancelEditStock();
                    renderStockList();
                    renderCustomGroupList();

                    alert(
                        isEditing
                            ? (
                                "✅ 修改成功！\n" +
                                "代號：" +
                                ticker +
                                "\n分組：" +
                                getGroupDisplayName(
                                    groupId
                                )
                            )
                            : (
                                "🎉 儲存成功！\n" +
                                "代號：" +
                                ticker +
                                "\n分組：" +
                                getGroupDisplayName(
                                    groupId
                                )
                            )
                    );

                    return;
                }

                if (isEditing) {
                    const {
                        data,
                        error
                    } = await _supabase
                        .from("stocks")
                        .update(saveData)
                        .eq(
                            "id",
                            editingStockId
                        )
                        .eq(
                            "line_user_id",
                            currentUserId
                        )
                        .select("id");

                    if (error) {
                        throw error;
                    }

                    if (
                        !data ||
                        data.length === 0
                    ) {
                        throw new Error(
                            "找不到要修改的資料，或沒有修改權限。"
                        );
                    }
                } else {
                    const { error } =
                        await _supabase
                            .from("stocks")
                            .upsert(
                                saveData,
                                {
                                    onConflict:
                                        "line_user_id,ticker,group_id"
                                }
                            );

                    if (error) {
                        throw error;
                    }
                }

                cancelEditStock();

                alert(
                    isEditing
                        ? (
                            "✅ 修改成功！\n" +
                            "代號：" +
                            ticker +
                            "\n分組：" +
                            getGroupDisplayName(
                                groupId
                            )
                        )
                        : (
                            "🎉 儲存成功！\n" +
                            "代號：" +
                            ticker +
                            "\n分組：" +
                            getGroupDisplayName(
                                groupId
                            )
                        )
                );

                await fetchUserStocks();
            } catch (error) {
                console.error(error);

                let message =
                    error.message ||
                    "未知錯誤";

                if (
                    message.includes("23505") ||
                    message.includes(
                        "duplicate key value"
                    ) ||
                    message.includes(
                        "stocks_line_user_id_ticker_group_key"
                    )
                ) {
                    message =
                        ticker +
                        " 已經存在於「" +
                        getGroupDisplayName(
                            groupId
                        ) +
                        "」分組中。";
                }

                alert(
                    "❌ 寫入失敗：" +
                    message
                );
            } finally {
                saveButton.disabled = false;

                saveButton.innerText =
                    editingStockId !== null
                        ? "儲存修改"
                        : "儲存自選股設定";
            }
        }

        async function deleteUserStock(
            stock,
            buttonElement
        ) {
            const groupDisplay =
                getGroupDisplayName(
                    stock.group_id
                );

            const confirmed = confirm(
                "確定要刪除以下自選股嗎？\n\n" +
                "股票：" +
                stock.ticker +
                "\n" +
                "分組：" +
                groupDisplay +
                "\n\n" +
                "其他分組中的相同股票不會被刪除。"
            );

            if (!confirmed) {
                return;
            }

            if (
                currentUserId ===
                "BROWSER_TEST_USER"
            ) {
                allUserStocks =
                    allUserStocks.filter(
                        item =>
                            item.id !==
                            stock.id
                    );

                if (
                    editingStockId ===
                    stock.id
                ) {
                    cancelEditStock();
                }

                renderStockList();
                renderCustomGroupList();

                alert(
                    "✅ 已刪除\n" +
                    "股票：" +
                    stock.ticker +
                    "\n分組：" +
                    groupDisplay
                );

                return;
            }

            if (!_supabase) {
                alert(
                    "Supabase 未就緒！"
                );

                return;
            }

            if (
                stock.id === undefined ||
                stock.id === null
            ) {
                alert(
                    "❌ 缺少資料 ID，無法安全刪除。"
                );

                return;
            }

            try {
                buttonElement.disabled = true;

                buttonElement.textContent =
                    "刪除中...";

                const {
                    data,
                    error
                } = await _supabase
                    .from("stocks")
                    .delete()
                    .eq(
                        "id",
                        stock.id
                    )
                    .eq(
                        "line_user_id",
                        currentUserId
                    )
                    .select("id");

                if (error) {
                    throw error;
                }

                if (
                    !data ||
                    data.length === 0
                ) {
                    throw new Error(
                        "找不到要刪除的資料，或沒有刪除權限。"
                    );
                }

                allUserStocks =
                    allUserStocks.filter(
                        item =>
                            item.id !==
                            stock.id
                    );

                if (
                    editingStockId ===
                    stock.id
                ) {
                    cancelEditStock();
                }

                renderStockList();
                renderCustomGroupList();

                alert(
                    "✅ 已刪除\n" +
                    "股票：" +
                    stock.ticker +
                    "\n分組：" +
                    groupDisplay
                );
            } catch (error) {
                console.error(error);

                alert(
                    "❌ 刪除失敗：" +
                    (
                        error.message ||
                        "未知錯誤"
                    )
                );

                buttonElement.disabled =
                    false;

                buttonElement.textContent =
                    "刪除";
            }
        }

        async function saveAdminStock() {
            if (!_supabase) {
                return alert(
                    "Supabase 未就緒！"
                );
            }

            const saveButton =
                document.getElementById(
                    "save-admin-stock-btn"
                );

            const selectElement =
                document.getElementById(
                    "admin-idx-select"
                );

            const ticker =
                selectElement.value;

            const rawText =
                selectElement.options[
                    selectElement.selectedIndex
                ].text;

            const cleanName =
                rawText.split(" (")[0];

            const masStr =
                document.getElementById(
                    "admin-idx-mas"
                ).value.trim();

            if (!masStr) {
                return alert(
                    "請填寫大盤均線參數！"
                );
            }

            const maResult =
                parseMovingAverages(
                    masStr
                );

            if (!maResult.success) {
                return alert(
                    maResult.message
                );
            }

            const masArray =
                maResult.values;

            const saveData = {
                ticker: ticker,
                name: cleanName,
                ma1: masArray[0] || 0,
                ma2: masArray[1] || 0,
                ma3: masArray[2] || 0,
                ma4: masArray[3] || 0
            };

            try {
                saveButton.disabled = true;

                saveButton.innerText =
                    "儲存中...";

                const { error } =
                    await _supabase
                        .from(
                            "index_configs"
                        )
                        .upsert(
                            saveData,
                            {
                                onConflict:
                                    "ticker"
                            }
                        );

                if (error) {
                    throw error;
                }

                alert(
                    "👑 大盤參數更新成功！\n" +
                    "名稱：" +
                    cleanName +
                    "\n代號：" +
                    ticker
                );

                document.getElementById(
                    "admin-idx-mas"
                ).value = "";
            } catch (error) {
                console.error(error);

                alert(
                    "❌ 大盤參數寫入失敗：" +
                    (
                        error.message ||
                        "未知錯誤"
                    )
                );
            } finally {
                saveButton.disabled =
                    false;

                saveButton.innerText =
                    "儲存大盤設定";
            }
        }
    </script>

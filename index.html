<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的專屬量化清單</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; color: #333; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; margin: 10px; min-width: 300px; vertical-align: top; }
        img { border-radius: 50%; width: 60px; height: 60px; margin-bottom: 10px; }
        .form-group { margin: 15px 0; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        .ma-container { display: flex; gap: 6px; }
        .ma-container input { text-align: center; }
        .btn { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #007bff; color: white; }

        /* 📊 擴充：大盤專用響應式微調樣式 */
        .index-item { border-bottom: 1px solid #eee; padding: 12px 0; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px; }
        .index-item:last-child { border-bottom: none; }
        .index-meta { text-align: left; }
        .index-title { font-weight: bold; font-size: 15px; color: #222; }
        .index-badge { font-size: 12px; color: #666; background: #e9ecef; padding: 2px 6px; border-radius: 4px; margin-left: 5px; font-family: monospace; }
        .index-inputs { display: flex; gap: 5px; align-items: center; }
        .index-inputs input { width: 50px; padding: 6px; text-align: center; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        .btn-inline-save { background-color: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 5px; font-size: 13px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn-inline-save:hover { background-color: #218838; }
        .btn-inline-save:disabled { background-color: #ccc; cursor: not-allowed; }
        .toast-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(40, 167, 69, 0.9); color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; display: none; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <h2>📊 我的專屬量化看盤室</h2>
    
    <div class="card" id="profile-card">
        <p>ℹ️ 本地測試模式（未登入 LINE）</p>
    </div>

    <div class="card">
        <h3>➕ 新增/修改觀察股票</h3>
        
        <div class="form-group">
            <label>設定報告歸類組別 (已同步雲端)</label>
            <select id="group-input">
                <option value="">載入組別中...</option>
            </select>
        </div>

        <div class="form-group">
            <label>股票代碼 (台股請加 .TW)</label>
            <input type="text" id="ticker-input" placeholder="例如: 2330.TW" value="2330.TW">
        </div>

        <div class="form-group">
            <label>這檔股票的獨立自訂均線 (留空或填0代表不使用)</label>
            <div class="ma-container">
                <input type="number" id="ma1-input" value="20" placeholder="MA 1">
                <input type="number" id="ma2-input" value="60" placeholder="MA 2">
                <input type="number" id="ma3-input" value="0" placeholder="MA 3">
                <input type="number" id="ma4-input" value="0" placeholder="MA 4">
            </div>
        </div>
        
        <button class="btn" id="add-btn" onclick="addStock()">加入/更新我的清單</button>
    </div>

    <br>

    <div class="card" style="width: 95%; max-width: 700px;">
        <h3>🌍 全球大盤均線參數控制台</h3>
        <p style="font-size: 13px; color: #666; margin-top: -8px; text-align: left; padding-left: 5px;">※ 這裡修改的參數，將在每天早晨機器人生成大盤多空報告時自動採用。</p>
        
        <div id="index-loading" style="color: #007bff; padding: 20px; font-weight: bold;">📡 正在連線 Supabase 讀取大盤參數...</div>
        <div id="index-list-container"></div>
    </div>

    <br>

    <div class="card" style="width: 95%; max-width: 700px;">
        <h3>📋 我的自訂觀察清單</h3>
        <table>
            <thead>
                <tr>
                    <th>股票代碼</th>
                    <th>目前價格</th>
                    <th>該股自訂均線</th>
                    <th>多空判定 (計分)</th>
                </tr>
            </thead>
            <tbody id="stock-table-body">
                <tr id="empty-row">
                    <td colspan="4" style="color: gray;">目前清單空空如也，請從上方新增股票</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="toast-alert" class="toast-msg"></div>

    <script>
        const LIFF_ID = "2010330411-SbwvRXRN";
        const BACKEND_URL = "https://my-stock-backend-bp8u.onrender.com";

        // Supabase 直連終端
        const SUPABASE_INDEX_URL = "https://bxhqpfeberqbtxymghyt.supabase.co/rest/v1/index_configs";
        const SUPABASE_KEY = "sb_publishable_eEJNM_96jblQ_90vpcYC0g_PzyGJNOK";
        const supabaseHeaders = {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json"
        };

        async function initializeLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById("profile-card").innerHTML = `
                        <img src="${profile.pictureUrl}" alt="大頭貼">
                        <h4>你好，${profile.displayName}</h4>
                    `;
                }
            } catch (err) { console.log("LIFF 初始化跳過"); }
            
            // 雙管齊下：同時加載 Render 的個股群組與 Supabase 的大盤清單
            await loadRealGroups();
            await fetchIndexConfigs();
        }

        // 🟢 智慧功能：動態跟資料庫要你「原本的組別」
        async function loadRealGroups() {
            const select = document.getElementById("group-input");
            try {
                const response = await fetch(`${BACKEND_URL}/api/groups`);
                if (response.ok) {
                    const data = await response.json();
                    select.innerHTML = ""; // 清空
                    
                    if (data.groups && data.groups.length > 0) {
                        data.groups.forEach(groupName => {
                            const opt = document.createElement("option");
                            opt.value = groupName;
                            opt.innerText = groupName;
                            select.appendChild(opt);
                        });
                    } else {
                        select.innerHTML = '<option value="預設觀察組">預設觀察組 (請先至資料庫建立組別)</option>';
                    }
                }
            } catch (err) {
                console.error("無法載入雲端組別:", err);
                select.innerHTML = '<option value="核心權值精選">連線失敗，暫用預設組別</option>';
            }
        }

        // 🟢 擴充功能：從 Supabase 獲取全球大盤均線設定
        async function fetchIndexConfigs() {
            try {
                const response = await fetch(`${SUPABASE_INDEX_URL}?order=ticker.asc`, { method: "GET", headers: supabaseHeaders });
                if (!response.ok) throw new Error("大盤資料讀取失敗");
                
                const data = await response.json();
                document.getElementById("index-loading").style.display = "none";
                renderIndexList(data);
            } catch (error) {
                console.error(error);
                document.getElementById("index-loading").innerText = "❌ 讀取大盤參數失敗，請檢查網路。";
            }
        }

        // 🟢 擴充功能：渲染大盤卡片清單
        function renderIndexList(data) {
            const container = document.getElementById("index-list-container");
            container.innerHTML = ""; 

            data.forEach(item => {
                const row = document.createElement("div");
                row.className = "index-item";
                
                const ma1 = item.ma1 || "";
                const ma2 = item.ma2 || "";
                const ma3 = item.ma3 || "";
                const ma4 = item.ma4 || "";

                row.innerHTML = `
                    <div class="index-meta">
                        <span class="index-title">${item.name}</span>
                        <span class="index-badge">${item.ticker}</span>
                    </div>
                    <div class="index-inputs">
                        <input type="number" id="idx-ma1-${item.ticker}" value="${ma1}" placeholder="無">
                        <input type="number" id="idx-ma2-${item.ticker}" value="${ma2}" placeholder="無">
                        <input type="number" id="idx-ma3-${item.ticker}" value="${ma3}" placeholder="無">
                        <input type="number" id="idx-ma4-${item.ticker}" value="${ma4}" placeholder="無">
                        <button class="btn-inline-save" onclick="saveIndexConfig('${item.ticker}', this)">儲存</button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        // 🟢 擴充功能：異步 PATCH 儲存大盤設定
        async function saveIndexConfig(ticker, button) {
            button.disabled = true;
            button.innerText = "同步中";

            const ma1 = parseBlurValue(document.getElementById(`idx-ma1-${ticker}`).value);
            const ma2 = parseBlurValue(document.getElementById(`idx-ma2-${ticker}`).value);
            const ma3 = parseBlurValue(document.getElementById(`idx-ma3-${ticker}`).value);
            const ma4 = parseBlurValue(document.getElementById(`idx-ma4-${ticker}`).value);

            const payload = { ma1, ma2, ma3, ma4 };

            try {
                const response = await fetch(`${SUPABASE_INDEX_URL}?ticker=eq.${encodeURIComponent(ticker)}`, {
                    method: "PATCH",
                    headers: supabaseHeaders,
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("寫入雲端失敗");
                triggerToast(`✅ ${ticker} 均線參數已更新！`);
            } catch (error) {
                console.error(error);
                alert("儲存大盤設定時發生錯誤。");
            } finally {
                button.disabled = false;
                button.innerText = "儲存";
            }
        }

        function parseBlurValue(val) {
            if (!val || val.trim() === "") return null;
            const num = parseInt(val, 10);
            return isNaN(num) || num <= 0 ? null : num;
        }

        function triggerToast(msg) {
            const toast = document.getElementById("toast-alert");
            toast.innerText = msg;
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 2500);
        }

        async function addStock() {
            const groupName = document.getElementById("group-input").value; 
            const ticker = document.getElementById("ticker-input").value.trim();
            const ma1 = document.getElementById("ma1-input").value || 0;
            const ma2 = document.getElementById("ma2-input").value || 0;
            const ma3 = document.getElementById("ma3-input").value || 0;
            const ma4 = document.getElementById("ma4-input").value || 0;
            
            if(!ticker) { alert("請輸入股票代碼！"); return; }
            if(!groupName) { alert("請選擇組別！"); return; }
            
            const btn = document.getElementById("add-btn");
            btn.innerText = "大腦計算與同步中...";
            btn.disabled = true;
            
            try {
                const url = `${BACKEND_URL}/api/analyze?ticker=${ticker}&ma1=${ma1}&ma2=${ma2}&ma3=${ma3}&ma4=${ma4}&group_name=${encodeURIComponent(groupName)}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    alert(errorData.detail || "抓取失敗");
                    return;
                }
                
                const data = await response.json();
                
                const emptyRow = document.getElementById("empty-row");
                if (emptyRow) emptyRow.remove();
                
                let maText = "";
                const maRes = data.ma_results;
                for (let i = 1; i <= 4; i++) {
                    if (maRes[`ma${i}`] > 0) {
                        maText += `<span style="display:inline-block; text-align:left; width:100%; font-size:13px;">📌 ${maRes[`ma${i}`]}MA: <b>$${maRes[`ma${i}_val`]}</b></span><br>`;
                    }
                }
                
                let statusColor = "#ffc107";
                if (data.status.includes("🟢")) statusColor = "#28a745";
                if (data.status.includes("🔴")) statusColor = "#dc3545";
                
                const tableBody = document.getElementById("stock-table-body");
                const rowId = `row-${data.ticker}`;
                const existingRow = document.getElementById(rowId);
                
                const rowHTML = `
                    <td><b>${data.ticker}</b></td>
                    <td>$${data.latest_price}</td>
                    <td style="padding: 8px 12px;">${maText}</td>
                    <td style="color: ${statusColor}; font-weight: bold; font-size: 15px;">${data.status}</td>
                `;
                
                if (existingRow) {
                    existingRow.innerHTML = rowHTML;
                } else {
                    const newRow = document.createElement("tr");
                    newRow.id = rowId;
                    newRow.innerHTML = rowHTML;
                    tableBody.appendChild(newRow);
                }
                
            } catch (err) {
                console.error(err);
                alert("連線失敗，請確認後端狀態。");
            } finally {
                btn.innerText = "加入/更新我的清單";
                btn.disabled = false;
            }
        }

        window.onload = initializeLiff;
    </script>
</body>
</html>

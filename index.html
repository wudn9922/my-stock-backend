<!DOCTYPE html>
<html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { background-color: #111; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 10px; } 
        .header { text-align: center; padding: 15px 0; background: #222; margin-bottom: 15px; border-radius: 8px; } 
        .category-box { background: #1a1a1a; padding: 12px; margin-bottom: 15px; border-radius: 8px; border-left: 4px solid #00b0ff; } 
        .category-title { font-size: 15px; font-weight: bold; color: #00ff88; margin-bottom: 10px; padding-left: 5px; } 
        
        /* 表單與表格樣式 */
        .form-input { width: 100%; padding: 8px; margin: 5px 0; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        .form-btn { width: 100%; padding: 10px; font-weight: bold; border: none; border-radius: 4px; margin-top: 10px; cursor: pointer; }
        .stock-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        .stock-table th { background: #222; color: #aaa; padding: 10px; text-align: left; border-bottom: 2px solid #444; white-space: nowrap; }
        .stock-table td { padding: 10px; border-bottom: 1px solid #333; color: #fff; }
        
        /* 讓標題區塊可以左右對齊 (用於清單過濾器) */
        .title-flex { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    </style>

<!DOCTYPE html>
<html>
<head>
    <title>自選股均線參數控制台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #111; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 10px; } 
        .header { text-align: center; padding: 15px 0; background: #222; margin-bottom: 15px; border-radius: 8px; } 
        .category-box { background: #1a1a1a; padding: 12px; margin-bottom: 15px; border-radius: 8px; border-left: 4px solid #00b0ff; } 
        .category-title { font-size: 15px; font-weight: bold; color: #00ff88; margin-bottom: 10px; padding-left: 5px; } 
        .form-input { width: 100%; padding: 8px; margin: 5px 0; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        .form-btn { width: 100%; padding: 10px; font-weight: bold; border: none; border-radius: 4px; margin-top: 10px; cursor: pointer; }
        .stock-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        .stock-table th { background: #222; color: #aaa; padding: 10px; text-align: left; border-bottom: 2px solid #444; white-space: nowrap; }
        .stock-table td { padding: 10px; border-bottom: 1px solid #333; color: #fff; }
        .title-flex { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    </style>
</head>
<body>

    <div class="header" style="background: #00b0ff;">
        <h2 style="margin: 0; color: #fff;">⚙️ 自選股均線參數控制台</h2>
        <p id="liff-status" style="margin: 5px 0 0 0; color:#fff; font-size:13px;">網頁骨架已載入...</p>
        <p id="user-id-display" style="margin: 2px 0 0 0; color:#ffeb3b; font-size:11px;">正在載入身分識別...</p>
    </div>

    <div class="category-box" style="border-left-color: #00ff88;" id="user-panel">
        <div class="category-title" style="color: #00ff88;">➕ 新增/修改 我的自選股</div>
        <input type="text" id="reg-ticker" class="form-input" placeholder="股票代號 (例: 2330.TW)">
        <select id="reg-group" class="form-input">
            <option value="tw_g1">🇹🇼 台股 - 權值精選</option>
            <option value="tw_g2">🇹🇼 台股 - 熱門</option>
            <option value="us_g1">🇺🇸 美股 - 權值精選</option>
            <option value="us_g2">🇺🇸 美股 - 低本益比</option>
            <option value="us_g3">🇺🇸 美股 - 超級績效</option>
            <option value="us_g4">🇺🇸 美股 - 熱門</option>
        </select>
        <input type="text" id="reg-mas" class="form-input" placeholder="均線參數 (用逗號隔開，例: 20,60,120)">
        <button onclick="saveUserStock()" class="form-btn" style="background: #00ff88; color: #000;">儲存自選股設定</button>
    </div>

    <div class="category-box" style="border-left-color: #ff5252; display: none;" id="admin-panel">
        <div class="category-title" style="color: #ff5252;">👑 全域大盤廣播參數 (僅管理員)</div>
        <select id="admin-idx-select" class="form-input" style="font-size: 14px;">
            <optgroup label="🇹🇼 台灣股市">
                <option value="^TWII">台灣加權指數 (^TWII)</option>
                <option value="^TWOII">櫃買指數 (^TWOII)</option>
            </optgroup>
            <optgroup label="🇺🇸 美國股市">
                <option value="^GSPC">標普500 (^GSPC)</option>
                <option value="^IXIC">那斯達克 (^IXIC)</option>
                <option value="^IXIC">那斯達克 (^IXIC)</option>
                <option value="^RUT">羅素2000 (^RUT)</option>
                <option value="^SOX">費城半導體 (^SOX)</option>
            </optgroup>
            <optgroup label="🇪🇺 歐洲股市">
                <option value="^FCHI">法國 CAC40 (^FCHI)</option>
                <option value="^FTSE">英國富時100 (^FTSE)</option>
                <option value="^GDAXI">德國 DAX (^GDAXI)</option>
            </optgroup>
            <optgroup label="🌏 亞洲股市">
                <option value="^N225">日經225 (^N225)</option>
                <option value="^KS11">韓國 KOSPI (^KS11)</option>
            </optgroup>
        </select>
        <input type="text" id="admin-idx-mas" class="form-input" placeholder="請輸入大盤均線參數 (例: 20,50,200)">
        <button onclick="saveAdminStock()" class="form-btn" style="background: #ff5252; color: #fff;">儲存大盤設定</button>
    </div>

    <div class="category-box" style="border-left-color: #ffeb3b;" id="stock-list-panel">
        <div class="category-title title-flex" style="color: #ffeb3b;">
            <span>📋 我的自選股追蹤清單</span>
            <select id="list-filter" class="form-input" style="width: auto; padding: 4px 8px; margin: 0; font-size: 13px;" onchange="renderStockList()">
                <option value="all">👀 顯示全部</option>
                <option value="tw_g1">🇹🇼 台股 - 權值</option>
                <option value="tw_g2">🇹🇼 台股 - 熱門</option>
                <option value="us_g1">🇺🇸 美股 - 權值</option>
                <option value="us_g2">🇺🇸 美股 - 低本</option>
                <option value="us_g3">🇺🇸 美股 - 績效</option>
                <option value="us_g4">🇺🇸 美股 - 熱門</option>
            </select>
        </div>
        <div style="overflow-x: auto;">
            <table class="stock-table">
                <thead>
                    <tr>
                        <th>編號</th>
                        <th>代碼</th>
                        <th>群組</th>
                        <th>參數</th>
                    </tr>
                </thead>
                <tbody id="stock-list-body">
                    <tr><td colspan="4" style="text-align:center; color:#666;">系統初始化中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 🛑 手機即時除錯盾牌：如果以下 JS 有任何崩潰，直接在手機上彈窗通知
        window.onerror = function(message, source, lineno, colno, error) {
            alert("🚨 網頁出錯了！\n錯誤訊息: " + message + "\n錯誤行號: " + lineno);
            return false;
        };
    </script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const SUPABASE_URL = "https://bxhqpfeberqbtxymghyt.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_eEJNM_96jblQ_90vpcYC0g_PzyGJNOK";
        const LIFF_ID = "2010330411-SbwvRXRN"; 
        const ADMIN_LINE_ID = "Ua0037dbd5037b64fc76804c60520ad76";

        let _supabase;
        let currentUserId = "GUEST";
        let allUserStocks = []; 

        const groupNameMap = {
            "tw_g1": "台股權值", "tw_g2": "台股熱門",
            "us_g1": "美股權值", "us_g2": "低本益比",
            "us_g3": "超級績效", "us_g4": "美股熱門"
        };

        window.onload = async function() {
            // 嘗試初始化 Supabase
            try {
                _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } catch (e) {
                alert("Supabase 連線失敗: " + e.message);
            }

            // 嘗試初始化 LINE LIFF
            try {
                await liff.init({ liffId: LIFF_ID });
                
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    // 強制清除可能存在的隱形空白
                    currentUserId = profile.userId.trim(); 
                    document.getElementById("liff-status").innerText = "👤 已登入: " + profile.displayName;
                    document.getElementById("user-id-display").innerText = "ID: " + currentUserId;
                    
                    // 🚨 直接在這裡做權限檢查，確保變數 100% 已經拿到
                    if (currentUserId === ADMIN_LINE_ID.trim()) {
                        document.getElementById("admin-panel").style.display = "block";
                    }
                } else {
                    document.getElementById("liff-status").innerText = "⚠️ 測試模式 (未在 LINE 內登入)";
                    currentUserId = "BROWSER_TEST_USER";
                    document.getElementById("user-id-display").innerText = "ID: BROWSER_TEST_USER";
                    
                    // 電腦預覽測試時也給予管理員畫面
                    document.getElementById("admin-panel").style.display = "block";
                }
            } catch (err) {
                document.getElementById("liff-status").innerText = "ℹ️ 瀏覽器預覽模式";
                currentUserId = "BROWSER_TEST_USER";
                document.getElementById("user-id-display").innerText = "ID: BROWSER_TEST_USER";
                document.getElementById("admin-panel").style.display = "block";
            }

            // 撈取資料庫清單
            fetchUserStocks();
        };


        async function fetchUserStocks() {
            if (!_supabase) return;

            // 測試模式的假資料
            if (currentUserId === "BROWSER_TEST_USER") {
                allUserStocks = [
                    { ticker: "2330.TW", group_id: "tw_g1", ma1: 20, ma2: 60, ma3: 120, ma4: 0 },
                    { ticker: "AAPL", group_id: "us_g1", ma1: 50, ma2: 200, ma3: 0, ma4: 0 }
                ];
                renderStockList();
                return;
            }

            const { data, error } = await _supabase
                .from('stocks')
                .select('ticker, group_id, ma1, ma2, ma3, ma4')
                .eq('line_user_id', currentUserId)
                .neq('group_id', 'admin_index');

            if (error) {
                console.error(error);
                return;
            }

            allUserStocks = data || [];
            renderStockList(); 
        }

        function renderStockList() {
            const tbody = document.getElementById("stock-list-body");
            const filterValue = document.getElementById("list-filter").value;
            tbody.innerHTML = "";

            const filteredStocks = filterValue === "all" 
                ? allUserStocks 
                : allUserStocks.filter(s => s.group_id === filterValue);

            if (filteredStocks.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#666; padding:20px;">此分類目前無追蹤股票。</td></tr>`;
                return;
            }

            filteredStocks.forEach((stock, index) => {
                let mas = [stock.ma1, stock.ma2, stock.ma3, stock.ma4].filter(num => num > 0).join(', ');
                let groupDisplay = groupNameMap[stock.group_id] || stock.group_id;
                
                let tr = document.createElement("tr");
                tr.innerHTML = `
                    <td style="color: #888;">${index + 1}</td>
                    <td style="font-weight: bold; color: #00ff88;">${stock.ticker}</td>
                    <td style="color: #00b0ff; font-size: 12px;">${groupDisplay}</td>
                    <td>${mas || '未設定'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function saveUserStock() {
            if (!_supabase) return alert("Supabase 未就緒！");
            let ticker = document.getElementById("reg-ticker").value.trim().toUpperCase();
            let groupId = document.getElementById("reg-group").value;
            let masStr = document.getElementById("reg-mas").value.trim();

            if (!ticker || !masStr) return alert("請填寫代號與均線！");
            let masArray = masStr.split(',').map(num => parseInt(num.trim())).filter(num => !isNaN(num));
            
            const saveData = {
                line_user_id: currentUserId,
                ticker: ticker,
                group_id: groupId,
                ma1: masArray[0] || 0,
                ma2: masArray[1] || 0,
                ma3: masArray[2] || 0,
                ma4: masArray[3] || 0
            };

            const { error } = await _supabase.from('stocks').upsert(saveData, { onConflict: 'line_user_id,ticker' });
            if (error) alert("❌ 寫入失敗: " + error.message);
            else {
                alert(`🎉 儲存成功！\n代號: ${ticker}`);
                document.getElementById("reg-ticker").value = "";
                document.getElementById("reg-mas").value = "";
                fetchUserStocks(); 
            }
        }


        async function saveAdminStock() {
            if (!_supabase) return alert("Supabase 未就緒！");
            let ticker = document.getElementById("admin-idx-select").value;
            let masStr = document.getElementById("admin-idx-mas").value.trim();
            if (!masStr) return alert("請填寫大盤均線參數！");

            let masArray = masStr.split(',').map(num => parseInt(num.trim())).filter(num => !isNaN(num));

            // 針對 index_configs 資料表的結構
            const saveData = {
                ticker: ticker,
                ma1: masArray[0] || 0,
                ma2: masArray[1] || 0,
                ma3: masArray[2] || 0,
                ma4: masArray[3] || 0
            };

            // 🚨 寫入 index_configs 資料表，以 ticker 作為防衝突鍵
            const { error } = await _supabase.from('index_configs').upsert(saveData, { onConflict: 'ticker' });
            
            if (error) {
                alert("❌ 大盤參數寫入失敗: " + error.message);
            } else {
                alert(`👑 大盤參數更新成功！\n資料表: index_configs\n代號: ${ticker}`);
                document.getElementById("admin-idx-mas").value = "";
            }
        }
    </script>
</body>
</html>
